name: Schema Release

on:
  push:
    branches:
      - main
    paths:
      - 'spec/**'

permissions:
  contents: write

jobs:
  release-schema:
    name: Publish schema to openastra.org and GitHub Releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate VERSION
        id: version
        run: |
          if [ ! -f spec/VERSION ]; then
            echo "::error::spec/VERSION not found"
            exit 1
          fi
          VERSION=$(tr -d '[:space:]' < spec/VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::spec/VERSION '$VERSION' is not valid semver (MAJOR.MINOR.PATCH)"
            exit 1
          fi
          SCHEMA_DIR="v$(echo $VERSION | cut -d. -f1-2)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "schema_dir=$SCHEMA_DIR" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/spec-v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Tag spec-v${{ steps.version.outputs.version }} already exists. Bump spec/VERSION."
            exit 1
          fi

      - name: Publish schema to openastra.org
        env:
          DEPLOY_TOKEN: ${{ secrets.OEBC_DEPLOY_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_DIR="${{ steps.version.outputs.schema_dir }}"

          if ! ls spec/schemas/oebc-v*.json 1>/dev/null 2>&1; then
            echo "::error::No JSON schema file found in spec/schemas/"
            exit 1
          fi

          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/sadayamuthu/openastra.org.git /tmp/openastra-org

          mkdir -p /tmp/openastra-org/oebc/schema/${SCHEMA_DIR}
          cp spec/schemas/oebc-v*.json /tmp/openastra-org/oebc/schema/${SCHEMA_DIR}/oebc.json
          cp spec/schemas/oebc-v*.yaml /tmp/openastra-org/oebc/schema/${SCHEMA_DIR}/oebc.yaml 2>/dev/null || true

          cd /tmp/openastra-org
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add oebc/schema/${SCHEMA_DIR}/
          if git diff --cached --quiet; then
            echo "No schema changes to publish."
          else
            git commit -m "schema: publish oebc spec v${VERSION}"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: spec-v${{ steps.version.outputs.version }}
          name: "OEBC Schema v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            spec/schemas/oebc-v*.json
            spec/schemas/oebc-v*.yaml
