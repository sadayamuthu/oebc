name: Main Release Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openastra-org-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: make install-dev

      - name: Run code validation checks
        run: make check

  generate-and-release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: make install

      - name: Generate catalog
        run: make generate

      - name: Publish catalog to openastra.org
        id: publish
        env:
          DEPLOY_TOKEN: ${{ secrets.OEBC_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < spec/VERSION)
          SCHEMA_DIR="v$(echo $VERSION | cut -d. -f1-2)"
          DATE=$(date -u +%Y-%m-%d)

          # Compress catalog — raw JSON is ~290 MB which exceeds GitHub's 100 MB limit.
          # gzip typically achieves ~10x compression on JSON, bringing it to ~25-30 MB.
          gzip -9 -k oebc_full_catalog_enriched.json
          # Rename so the extension stays .json.gz for clarity
          mv oebc_full_catalog_enriched.json.gz oebc_full_catalog_enriched.json.gz

          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/sadayamuthu/openastra.org.git /tmp/openastra-org

          # Publish only the compressed latest snapshot to the repo.
          # Historical snapshots are attached to GitHub Releases (see next step)
          # to avoid unbounded repo growth (~30 MB/day).
          mkdir -p /tmp/openastra-org/oebc/catalog/${SCHEMA_DIR}
          cp oebc_full_catalog_enriched.json.gz \
            /tmp/openastra-org/oebc/catalog/${SCHEMA_DIR}/latest.json.gz

          cd /tmp/openastra-org
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add oebc/catalog/${SCHEMA_DIR}/latest.json.gz
          if git diff --cached --quiet; then
            echo "No catalog changes to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "catalog: update oebc baseline ${DATE}"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with historical snapshot
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="baseline-$(date -u +%Y-%m-%d)"
          COUNT=$(jq '.count' oebc_full_catalog_enriched.json)
          GENERATED=$(jq -r '.generated_at_utc' oebc_full_catalog_enriched.json)
          VERSION=$(tr -d '[:space:]' < spec/VERSION)
          SCHEMA_DIR="v$(echo $VERSION | cut -d. -f1-2)"
          DATE=$(date -u +%Y-%m-%d)

          # Name the release asset with the date so each release is self-describing
          cp oebc_full_catalog_enriched.json.gz "oebc-catalog-${DATE}.json.gz"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "Open Exposure Baseline Catalog — ${TAG}" \
            --notes "$(cat <<EOF
          ## Open Exposure Baseline Catalog (OEBC)

          **Generated at:** ${GENERATED}
          **Total vulnerabilities:** ${COUNT}

          ### Download

          The catalog is gzip-compressed JSON (~25-30 MB). Decompress with:

          \`\`\`bash
          curl -L https://openastra.org/oebc/catalog/${SCHEMA_DIR}/latest.json.gz | gunzip > oebc_catalog.json
          \`\`\`

          Or download the historical snapshot attached to this release and decompress locally:

          \`\`\`bash
          gunzip oebc-catalog-${DATE}.json.gz
          \`\`\`

          ### Catalog URLs

          - Latest (compressed): https://openastra.org/oebc/catalog/${SCHEMA_DIR}/latest.json.gz
          - Historical snapshots: attached as release assets to each daily release

          > Generated automatically by GitHub Actions from NVD, EPSS, and CISA KEV sources.
          EOF
          )" \
            "oebc-catalog-${DATE}.json.gz"
